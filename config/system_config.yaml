name: "自动化控制系统"
version: "1.0.0"

heaters:
  - device_id: "heater1"
    name: "加热器1"
    connection:
      port: "COM7"
      baudrate: 9600
      address: 1
      parity: "N"
      timeout: 2.0
    decimal_places: 1
    temperature_unit: "C"
    max_temperature: 400.0
    min_temperature: 0.0
    safety_limit: 450.0
    poll_interval: 1.0
    retry_count: 3
    retry_delay: 0.5
    enabled: true

  - device_id: "heater2"
    name: "加热器2"
    connection:
      port: "COM9"
      baudrate: 9600
      address: 1
      parity: "N"
      timeout: 2.0
    decimal_places: 1
    temperature_unit: "C"
    max_temperature: 400.0
    min_temperature: 0.0
    safety_limit: 450.0
    poll_interval: 1.0
    retry_count: 3
    retry_delay: 0.5
    enabled: true

pumps:
  - device_id: "pump1"
    name: "蠕动泵"
    connection:
      port: "COM10"
      baudrate: 9600
      parity: "N"
      stopbits: 1
      bytesize: 8
    slave_address: 1
    timeout: 2.0
    poll_interval: 1.0
    retry_count: 3
    retry_delay: 0.5
    enabled: true
    channels:
      - channel: 1
        enabled: true
        pump_head: 5
        tube_model: 0
        suck_back_angle: 0
        max_flow_rate: 100.0
      - channel: 2
        enabled: true
        pump_head: 5
        tube_model: 0
        suck_back_angle: 0
        max_flow_rate: 100.0
      - channel: 3
        enabled: true
        pump_head: 5
        tube_model: 0
        suck_back_angle: 0
        max_flow_rate: 100.0
      - channel: 4
        enabled: true
        pump_head: 5
        tube_model: 0
        suck_back_angle: 0
        max_flow_rate: 100.0

monitor:
  enabled: true
  log_interval: 1.0
  data_retention_hours: 24
  alarm_check_interval: 0.5
  enable_csv_logging: true
  enable_database: false
  database_path: "data/monitor.db"

report:
  output_dir: "reports"
  default_format: "html"
  include_charts: true
  include_statistics: true
  auto_generate: false
  template_dir: "templates"

logging:
  level: "INFO"
  log_dir: "logs"
  max_file_size_mb: 10
  backup_count: 5
  console_output: true
  file_output: true
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
